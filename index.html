<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTE DI 템플릿 퀴즈</title>
<style>
:root {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #1a202c;
  --text-muted: #718096;
  --accent: #185FA5;
  --accent-light: #e8f0fb;
  --correct: #3B6D11;
  --correct-bg: #f0fff4;
  --correct-border: #9ae6b4;
  --wrong: #A32D2D;
  --wrong-bg: #fff5f5;
  --wrong-border: #feb2b2;
  --radius: 10px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2d3148;
    --text: #e2e8f0;
    --text-muted: #a0aec0;
    --accent: #4a90d9;
    --accent-light: #1a2a40;
    --correct: #68d391;
    --correct-bg: #1a2e22;
    --correct-border: #2f855a;
    --wrong: #fc8181;
    --wrong-bg: #2d1515;
    --wrong-border: #c53030;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
#app {
  width: 100%;
  max-width: 640px;
  padding: 16px;
}
.screen { display: none; }
.screen.active { display: block; }

/* Progress bar */
#progress-bar-wrap {
  position: fixed; top: 0; left: 0; right: 0; height: 4px;
  background: var(--border); z-index: 100;
}
#progress-bar { height: 100%; background: var(--accent); transition: width 0.3s; width: 0%; }

/* Headings */
h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; }
.subtitle { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px; }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}

/* Buttons */
.btn {
  display: inline-block;
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-sm { padding: 6px 14px; font-size: 0.82rem; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

/* Tag groups (type/mode/difficulty selectors) */
.tag-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.tag {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.15s;
}
.tag.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 600; }
.label-row { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.03em; text-transform: uppercase; }

/* Quiz template display */
#template-text {
  font-size: 0.95rem;
  line-height: 2.2;
  letter-spacing: 0.01em;
}
#template-text .section-label { font-weight: 700; }
#template-text .blank-wrap { display: inline-flex; flex-direction: column; align-items: center; vertical-align: bottom; margin: 0 2px; }
#template-text .blank-input {
  border: none;
  border-bottom: 2px solid var(--accent);
  background: transparent;
  color: var(--text);
  font-size: 0.95rem;
  font-family: inherit;
  outline: none;
  min-width: 60px;
  text-align: center;
  padding: 0 4px 1px;
}
#template-text .blank-select {
  border: none;
  border-bottom: 2px solid var(--accent);
  background: transparent;
  color: var(--text);
  font-size: 0.92rem;
  font-family: inherit;
  outline: none;
  cursor: pointer;
  padding: 0 2px 1px;
  appearance: none;
  -webkit-appearance: none;
  max-width: 220px;
}
#template-text .blank-wrap.correct .blank-input,
#template-text .blank-wrap.correct .blank-select { border-color: var(--correct); color: var(--correct); }
#template-text .blank-wrap.wrong .blank-input,
#template-text .blank-wrap.wrong .blank-select { border-color: var(--wrong); color: var(--wrong); }
#template-text .answer-hint {
  font-size: 0.7rem;
  color: var(--correct);
  margin-top: 1px;
  white-space: nowrap;
}

/* Stats */
.stat-bar-wrap { margin-bottom: 14px; }
.stat-bar-label { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 4px; }
.stat-bar-bg { background: var(--border); border-radius: 4px; height: 10px; overflow: hidden; }
.stat-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.5s; }

/* Wrong notes */
.wrong-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.wrong-item .wi-text { font-size: 0.88rem; flex: 1; }
.wrong-item .wi-meta { font-size: 0.75rem; color: var(--text-muted); }
.empty-msg { color: var(--text-muted); font-size: 0.9rem; text-align: center; padding: 30px 0; }

/* Misc */
.back-btn { font-size: 0.82rem; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 14px; }
.session-info { font-size: 0.78rem; color: var(--text-muted); text-align: right; margin-bottom: 8px; }

/* Responsive tweaks */
@media (max-width: 400px) {
  #template-text { font-size: 0.88rem; }
  .btn { padding: 9px 16px; }
}
</style>
</head>
<body>
<div id="progress-bar-wrap"><div id="progress-bar"></div></div>
<div id="app">

<!-- HOME SCREEN -->
<div id="screen-home" class="screen active">
  <div style="padding-top: 28px; margin-bottom: 20px;">
    <h1>PTE DI 템플릿 퀴즈</h1>
    <p class="subtitle">Describe Image 핵심 표현을 빈칸으로 학습</p>
  </div>

  <div class="card">
    <div class="label-row">템플릿 유형</div>
    <div class="tag-group" id="type-group">
      <span class="tag active" data-val="graph-compare">그래프 비교형</span>
      <span class="tag" data-val="graph-trend">그래프 증감형</span>
      <span class="tag" data-val="pie">Pie / Table</span>
      <span class="tag" data-val="flowchart">순서도</span>
      <span class="tag" data-val="photo">사진</span>
    </div>

    <div class="label-row" style="margin-top:14px;">모드</div>
    <div class="tag-group" id="mode-group">
      <span class="tag active" data-val="typing">타이핑</span>
      <span class="tag" data-val="dropdown">드롭다운</span>
    </div>

    <div class="label-row" style="margin-top:14px;">난이도</div>
    <div class="tag-group" id="diff-group">
      <span class="tag active" data-val="3">입문 (3개)</span>
      <span class="tag" data-val="5">중급 (5개)</span>
      <span class="tag" data-val="8">고급 (8개)</span>
      <span class="tag" data-val="all">전체</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="startQuiz()">퀴즈 시작</button>
    <button class="btn btn-secondary" onclick="showStats()">통계 보기</button>
    <button class="btn btn-secondary" onclick="showWrongNote()">오답노트</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz" class="screen">
  <div style="padding-top: 20px;">
    <button class="back-btn" onclick="goHome()">← 홈으로</button>
    <div class="session-info" id="session-info"></div>
    <div class="card">
      <div id="template-text"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-check" onclick="checkAnswers()">확인</button>
      <button class="btn btn-secondary" id="btn-next" onclick="nextRound()" disabled>새 문제</button>
      <button class="btn btn-secondary btn-sm" onclick="goHome()">유형 변경</button>
    </div>
    <div id="result-msg" style="margin-top: 12px; font-size: 0.88rem;"></div>
  </div>
</div>

<!-- STATS SCREEN -->
<div id="screen-stats" class="screen">
  <div style="padding-top: 20px;">
    <button class="back-btn" onclick="goHome()">← 홈으로</button>
    <h2>유형별 정답률</h2>
    <div id="stats-content"></div>
    <div style="margin-top:16px;">
      <button class="btn btn-secondary btn-sm" onclick="if(confirm('통계를 초기화할까요?')){resetStats();showStats();}">통계 초기화</button>
    </div>
  </div>
</div>

<!-- WRONG NOTE SCREEN -->
<div id="screen-wrong" class="screen">
  <div style="padding-top: 20px;">
    <button class="back-btn" onclick="goHome()">← 홈으로</button>
    <h2>오답노트</h2>
    <div id="wrong-content"></div>
  </div>
</div>

</div><!-- #app -->

// ─── STATE ───────────────────────────────────────────────────────────────────

let state = {
  templateKey: 'graph-compare',
  mode: 'typing',
  difficulty: '3',
  sessionRound: 0,
  blankIndices: [],   // indices into tokens that are blank this round
  checked: false,
};

// ─── STORAGE ─────────────────────────────────────────────────────────────────

function loadStats() {
  try { return JSON.parse(localStorage.getItem('pte_stats') || '{}'); } catch { return {}; }
}
function saveStats(s) { localStorage.setItem('pte_stats', JSON.stringify(s)); }

function loadWrong() {
  try { return JSON.parse(localStorage.getItem('pte_wrong') || '[]'); } catch { return []; }
}
function saveWrong(w) { localStorage.setItem('pte_wrong', JSON.stringify(w)); }

function resetStats() {
  localStorage.removeItem('pte_stats');
  localStorage.removeItem('pte_wrong');
}

// ─── SCREEN NAV ──────────────────────────────────────────────────────────────

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() { showScreen('home'); updateProgressBar(0); }

// ─── HOME LOGIC ──────────────────────────────────────────────────────────────

function setupTagGroup(groupId, stateKey) {
  document.getElementById(groupId).querySelectorAll('.tag').forEach(tag => {
    tag.addEventListener('click', () => {
      document.getElementById(groupId).querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
      tag.classList.add('active');
      state[stateKey] = tag.dataset.val;
    });
  });
}

setupTagGroup('type-group', 'templateKey');
setupTagGroup('mode-group', 'mode');
setupTagGroup('diff-group', 'difficulty');

function startQuiz() {
  state.sessionRound = 0;
  showScreen('quiz');
  buildRound();
}

// ─── QUIZ LOGIC ──────────────────────────────────────────────────────────────

function getBlankCount(tokens) {
  const blanks = tokens.filter(t => t.t === 'blank');
  if (state.difficulty === 'all') return blanks.length;
  return Math.min(parseInt(state.difficulty), blanks.length);
}

function pickBlankIndices(tokens) {
  const blankIdxs = tokens.map((t, i) => t.t === 'blank' ? i : -1).filter(i => i >= 0);
  const n = getBlankCount(tokens);
  const shuffled = blankIdxs.slice().sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

function buildRound() {
  const tpl = TEMPLATES[state.templateKey];
  const tokens = tpl.tokens;
  state.blankIndices = pickBlankIndices(tokens);
  state.sessionRound += 1;
  state.checked = false;

  document.getElementById('btn-check').disabled = false;
  document.getElementById('btn-next').disabled = true;
  document.getElementById('result-msg').textContent = '';

  const totalBlanks = tokens.filter(t => t.t === 'blank').length;
  document.getElementById('session-info').textContent =
    `${tpl.name} · 라운드 ${state.sessionRound} · 빈칸 ${state.blankIndices.length}/${totalBlanks}`;

  updateProgressBar((state.sessionRound - 1) % 10 / 10 * 100);
  renderTemplate(tokens);
}

const SECTION_LABELS = ['Intro:', 'Body 1:', 'Body 2:', 'Body 3:', 'Conclusion:'];

function renderTemplate(tokens) {
  const container = document.getElementById('template-text');
  container.innerHTML = '';

  tokens.forEach((tok, i) => {
    if (tok.t === 'fixed') {
      // split on \n, render <br> and bold section labels
      const parts = tok.v.split('\n');
      parts.forEach((part, pi) => {
        if (pi > 0) container.appendChild(document.createElement('br'));
        // check for section label at start
        const label = SECTION_LABELS.find(l => part.startsWith(l));
        if (label) {
          const b = document.createElement('b');
          b.textContent = label;
          container.appendChild(b);
          const rest = document.createTextNode(part.slice(label.length));
          container.appendChild(rest);
        } else {
          container.appendChild(document.createTextNode(part));
        }
      });
    } else {
      // blank token
      const isBlank = state.blankIndices.includes(i);
      if (!isBlank) {
        // show answer text directly
        container.appendChild(document.createTextNode(tok.v));
      } else {
        const wrap = document.createElement('span');
        wrap.className = 'blank-wrap';
        wrap.dataset.idx = i;

        if (state.mode === 'typing') {
          const inp = document.createElement('input');
          inp.type = 'text';
          inp.className = 'blank-input';
          inp.placeholder = '___';
          // auto-size
          inp.style.width = Math.max(80, tok.v.length * 9) + 'px';
          inp.addEventListener('input', () => {
            inp.style.width = Math.max(80, inp.value.length * 9 + 20) + 'px';
          });
          wrap.appendChild(inp);
        } else {
          // dropdown
          const sel = document.createElement('select');
          sel.className = 'blank-select';
          const opts = [tok.v, ...tok.distractors].sort(() => Math.random() - 0.5);
          const placeholder = document.createElement('option');
          placeholder.value = '';
          placeholder.textContent = '--- 선택 ---';
          sel.appendChild(placeholder);
          opts.forEach(o => {
            const opt = document.createElement('option');
            opt.value = o;
            opt.textContent = o;
            sel.appendChild(opt);
          });
          sel.style.width = Math.max(100, tok.v.length * 8 + 40) + 'px';
          wrap.appendChild(sel);
        }

        container.appendChild(wrap);
      }
    }
  });
}

function getUserAnswer(wrap) {
  if (state.mode === 'typing') {
    return (wrap.querySelector('input') || {value:''}).value.trim();
  } else {
    return (wrap.querySelector('select') || {value:''}).value.trim();
  }
}

function isCorrect(userAns, correctAns) {
  const u = userAns.toLowerCase().trim();
  const variants = correctAns.split('/').map(s => s.toLowerCase().trim());
  return variants.some(v => v === u);
}

function checkAnswers() {
  if (state.checked) return;
  state.checked = true;

  const tpl = TEMPLATES[state.templateKey];
  const tokens = tpl.tokens;
  let correct = 0;
  let total = state.blankIndices.length;

  const stats = loadStats();
  const wrong = loadWrong();

  if (!stats[state.templateKey]) stats[state.templateKey] = {total: 0, correct: 0};

  const wraps = document.querySelectorAll('.blank-wrap');
  wraps.forEach(wrap => {
    const idx = parseInt(wrap.dataset.idx);
    const tok = tokens[idx];
    const userAns = getUserAnswer(wrap);
    const ok = isCorrect(userAns, tok.v);

    wrap.classList.add(ok ? 'correct' : 'wrong');

    // Disable input/select
    const inp = wrap.querySelector('input');
    const sel = wrap.querySelector('select');
    if (inp) inp.disabled = true;
    if (sel) sel.disabled = true;

    if (!ok) {
      const hint = document.createElement('span');
      hint.className = 'answer-hint';
      hint.textContent = '✓ ' + tok.v;
      wrap.appendChild(hint);

      // Add to wrong pool (deduplicate by answer+templateKey)
      const key = state.templateKey + '|' + tok.v;
      if (!wrong.find(w => w.key === key)) {
        wrong.push({ key, templateKey: state.templateKey, answer: tok.v });
      }
    } else {
      correct++;
      // Remove from wrong pool if mastered
      const key = state.templateKey + '|' + tok.v;
      const wi = wrong.findIndex(w => w.key === key);
      if (wi >= 0) wrong.splice(wi, 1);
    }
  });

  stats[state.templateKey].total += total;
  stats[state.templateKey].correct += correct;
  saveStats(stats);
  saveWrong(wrong);

  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  document.getElementById('result-msg').innerHTML =
    `<span style="color:${correct === total ? 'var(--correct)' : 'var(--wrong)'}">` +
    `${correct}/${total} 정답 (${pct}%)` +
    `</span>`;

  document.getElementById('btn-check').disabled = true;
  document.getElementById('btn-next').disabled = false;
  updateProgressBar(state.sessionRound % 10 / 10 * 100);
}

function nextRound() {
  buildRound();
}

function updateProgressBar(pct) {
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ─── STATS ───────────────────────────────────────────────────────────────────

function showStats() {
  const stats = loadStats();
  const container = document.getElementById('stats-content');
  container.innerHTML = '';

  let hasAny = false;
  Object.keys(TEMPLATES).forEach(key => {
    const s = stats[key];
    const total = s ? s.total : 0;
    const correct = s ? s.correct : 0;
    const pct = total > 0 ? Math.round(correct / total * 100) : 0;
    if (total > 0) hasAny = true;

    const wrap = document.createElement('div');
    wrap.className = 'stat-bar-wrap';
    wrap.innerHTML = `
      <div class="stat-bar-label">
        <span>${TEMPLATES[key].name}</span>
        <span>${correct}/${total} (${pct}%)</span>
      </div>
      <div class="stat-bar-bg">
        <div class="stat-bar-fill" style="width:${pct}%"></div>
      </div>`;
    container.appendChild(wrap);
  });

  if (!hasAny) {
    container.innerHTML = '<p class="empty-msg">아직 풀어본 문제가 없습니다.</p>';
  }

  showScreen('stats');
}

// ─── WRONG NOTE ──────────────────────────────────────────────────────────────

function showWrongNote() {
  const wrong = loadWrong();
  const container = document.getElementById('wrong-content');
  container.innerHTML = '';

  if (wrong.length === 0) {
    container.innerHTML = '<p class="empty-msg">오답이 없습니다! 훌륭해요.</p>';
  } else {
    // Group by template
    const grouped = {};
    wrong.forEach(w => {
      if (!grouped[w.templateKey]) grouped[w.templateKey] = [];
      grouped[w.templateKey].push(w);
    });

    Object.keys(grouped).forEach(key => {
      const header = document.createElement('div');
      header.style.cssText = 'font-weight:600; font-size:0.82rem; color:var(--text-muted); margin:14px 0 6px; text-transform:uppercase;';
      header.textContent = TEMPLATES[key].name;
      container.appendChild(header);

      grouped[key].forEach(w => {
        const item = document.createElement('div');
        item.className = 'wrong-item';
        item.innerHTML = `
          <div class="wi-text">${escHtml(w.answer)}</div>
          <button class="btn btn-secondary btn-sm" onclick="practiceWrong('${escHtml(key)}')">다시 풀기</button>`;
        container.appendChild(item);
      });
    });
  }

  showScreen('wrong');
}

function practiceWrong(templateKey) {
  state.templateKey = templateKey;
  // Update tag UI
  document.querySelectorAll('#type-group .tag').forEach(t => {
    t.classList.toggle('active', t.dataset.val === templateKey);
  });
  startQuiz();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
